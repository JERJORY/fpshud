name: Build Fabric Mod

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x gradlew || true

      - name: Build
        run: gradle build

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: fpshud-mod
          path: build/libs/*.jar
